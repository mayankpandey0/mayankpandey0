name: Update Profile Analytics

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_languages.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "mayankpandey0"
          git config --global user.email "mayankpandey230202@gmail.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update top languages analytics" && git push)
